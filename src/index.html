<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Jezdan</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d2b27" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Jezdan</h1>
      </header>
      <main>
        <p>Dual-Currency Cash Tracker</p>
      </main>

      <!-- Placeholder floating button for Task 3 verification -->
      <button id="btn-open-add-tx" class="btn-primary">+</button>

      <dialog id="add-tx-dialog">
        <form id="add-tx-form">
          <h2>Add Transaction</h2>

          <section class="tx-section">
            <h3>Paid</h3>
            <div id="paid-rows"></div>
            <button type="button" id="btn-add-paid-row" class="btn-text">
              + Add mixed currency
            </button>
          </section>

          <section class="tx-section">
            <h3>Received Back <span class="optional">(Optional)</span></h3>
            <div id="received-rows"></div>
            <button type="button" id="btn-add-received-row" class="btn-text">
              + Add change
            </button>
          </section>

          <section class="tx-section">
            <input
              type="text"
              id="tx-note"
              placeholder="Note (optional)"
              class="note-input"
            />
          </section>

          <div class="dialog-actions">
            <button type="button" id="btn-cancel-tx" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="btn-submit-tx" class="btn-primary">
              Save
            </button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
