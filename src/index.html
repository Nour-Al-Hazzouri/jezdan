<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Jezdan</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d2b27" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Jezdan</h1>
        <button type="button" id="btn-open-settings" class="btn-icon">
          ⚙️
        </button>
      </header>
      <main id="dashboard">
        <section class="wallet-cards">
          <div class="wallet-card" id="card-usd">
            <span class="currency-label">USD</span>
            <h2 id="usd-balance">0.00</h2>
          </div>
          <div class="wallet-card" id="card-lbp">
            <span class="currency-label">LBP</span>
            <h2 id="lbp-balance">0</h2>
          </div>
        </section>

        <section class="dashboard-actions">
          <button
            type="button"
            id="btn-open-history"
            class="btn-secondary"
            style="width: 100%"
          >
            View Transaction History
          </button>
        </section>
      </main>

      <button id="btn-open-add-tx" class="btn-primary">+</button>

      <dialog id="add-tx-dialog">
        <form id="add-tx-form">
          <h2>Add Transaction</h2>

          <section class="tx-section">
            <h3>Paid</h3>
            <div id="paid-rows"></div>
            <button type="button" id="btn-add-paid-row" class="btn-text">
              + Add mixed currency
            </button>
          </section>

          <section class="tx-section">
            <h3>Received Back <span class="optional">(Optional)</span></h3>
            <div id="received-rows"></div>
            <button type="button" id="btn-add-received-row" class="btn-text">
              + Add change
            </button>
          </section>

          <section class="tx-section">
            <input
              type="text"
              id="tx-note"
              placeholder="Note (optional)"
              class="note-input"
            />
          </section>

          <div class="dialog-actions">
            <button type="button" id="btn-cancel-tx" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="btn-submit-tx" class="btn-primary">
              Save
            </button>
          </div>
        </form>
      </dialog>

      <dialog id="history-dialog" class="full-dialog">
        <div class="dialog-header">
          <h2>Transaction History</h2>
          <button type="button" id="btn-close-history" class="btn-close">
            &times;
          </button>
        </div>
        <ul id="full-history-list" class="tx-list">
          <!-- Populated by JS -->
        </ul>
      </dialog>

      <dialog id="settings-dialog">
        <form id="settings-form">
          <div class="dialog-header">
            <h2>Settings</h2>
            <button type="button" id="btn-close-settings" class="btn-close">
              &times;
            </button>
          </div>

          <section class="tx-section">
            <h3>Opening Balances</h3>
            <div class="amount-row" style="margin-bottom: 0.5rem">
              <input
                type="number"
                id="setting-open-usd"
                class="amount-input"
                placeholder="0.00"
                step="any"
                required
              />
              <span class="currency-toggle" style="cursor: default">USD</span>
            </div>
            <div class="amount-row">
              <input
                type="number"
                id="setting-open-lbp"
                class="amount-input"
                placeholder="0"
                step="any"
                required
              />
              <span class="currency-toggle" style="cursor: default">LBP</span>
            </div>
          </section>

          <div class="dialog-actions" style="margin-top: 2rem">
            <button type="submit" id="btn-save-settings" class="btn-primary">
              Save Changes
            </button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
