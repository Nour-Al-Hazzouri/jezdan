<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Jezdan</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d2b27" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Jezdan</h1>
      </header>
      <main id="dashboard">
        <section class="wallet-cards">
          <div class="wallet-card" id="card-usd">
            <span class="currency-label">USD</span>
            <h2 id="usd-balance">0.00</h2>
          </div>
          <div class="wallet-card" id="card-lbp">
            <span class="currency-label">LBP</span>
            <h2 id="lbp-balance">0</h2>
          </div>
        </section>

        <section class="estimate-row">
          <span class="estimate-label">≈ Estimated Total</span>
          <h3 id="estimated-total">0.00 USD</h3>
        </section>

        <section class="recent-transactions">
          <h3>Recent Transactions</h3>
          <ul id="recent-tx-list" class="tx-list">
            <!-- Transactions populated via JS -->
            <li class="empty-state">No transactions yet</li>
          </ul>
          <button
            type="button"
            id="btn-open-history"
            class="btn-text"
            style="
              display: none;
              width: 100%;
              text-align: center;
              margin-top: 1rem;
            "
          >
            View All History
          </button>
        </section>
      </main>

      <button id="btn-open-add-tx" class="btn-primary">+</button>

      <dialog id="add-tx-dialog">
        <form id="add-tx-form">
          <h2>Add Transaction</h2>

          <section class="tx-section">
            <h3>Paid</h3>
            <div id="paid-rows"></div>
            <button type="button" id="btn-add-paid-row" class="btn-text">
              + Add mixed currency
            </button>
          </section>

          <section class="tx-section">
            <h3>Received Back <span class="optional">(Optional)</span></h3>
            <div id="received-rows"></div>
            <button type="button" id="btn-add-received-row" class="btn-text">
              + Add change
            </button>
          </section>

          <section class="tx-section">
            <input
              type="text"
              id="tx-note"
              placeholder="Note (optional)"
              class="note-input"
            />
          </section>

          <div class="dialog-actions">
            <button type="button" id="btn-cancel-tx" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" id="btn-submit-tx" class="btn-primary">
              Save
            </button>
          </div>
        </form>
      </dialog>

      <dialog id="history-dialog" class="full-dialog">
        <div class="dialog-header">
          <h2>Transaction History</h2>
          <button type="button" id="btn-close-history" class="btn-close">
            &times;
          </button>
        </div>
        <ul id="full-history-list" class="tx-list">
          <!-- Populated by JS -->
        </ul>
      </dialog>
    </div>
  </body>
</html>
